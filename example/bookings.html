<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - Traking Transfers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <style>
        /* Bookings Page Specific Styles */
        .bookings-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .booking-card {
            background: var(--color-white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            overflow: hidden;
        }

        .booking-card:hover {
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }

        .booking-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 1.5rem;
            background: var(--color-secondary);
            border-bottom: 1px solid var(--color-border);
        }

        .booking-route {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-family: var(--font-heading);
            font-size: 1.125rem;
            font-weight: 500;
            color: var(--color-primary);
        }

        .booking-route svg {
            width: 20px;
            height: 20px;
            color: var(--color-accent);
        }

        .booking-body {
            padding: 1.5rem;
        }

        .booking-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .detail-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .detail-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--color-text-light);
        }

        .detail-value {
            font-weight: 500;
            color: var(--color-primary);
            font-size: 0.9375rem;
        }

        .booking-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 1rem;
            border-top: 1px solid var(--color-border);
        }

        .booking-actions {
            display: flex;
            gap: 0.75rem;
        }

        .booking-price {
            font-family: var(--font-heading);
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--color-primary);
        }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
        }

        .page-btn {
            padding: 0.5rem 0.875rem;
            border: 1px solid var(--color-border);
            background: var(--color-white);
            border-radius: var(--radius-xs);
            font-family: inherit;
            font-size: 0.875rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .page-btn:hover:not(:disabled) {
            background: var(--color-secondary);
        }

        .page-btn.active {
            background: var(--color-primary);
            color: var(--color-white);
            border-color: var(--color-primary);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .stats-summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-box {
            background: var(--color-white);
            padding: 1.25rem;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-sm);
            text-align: center;
        }

        .stat-number {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 600;
            color: var(--color-primary);
        }

        .stat-label-sm {
            font-size: 0.8125rem;
            color: var(--color-text-light);
            margin-top: 0.25rem;
        }

        @media (max-width: 768px) {
            .stats-summary {
                grid-template-columns: repeat(2, 1fr);
            }

            .booking-header {
                flex-direction: column;
                gap: 0.75rem;
                align-items: flex-start;
            }

            .booking-details {
                grid-template-columns: 1fr;
            }

            .booking-footer {
                flex-direction: column;
                gap: 1rem;
                align-items: stretch;
            }

            .booking-actions {
                width: 100%;
                justify-content: stretch;
            }

            .booking-actions .btn {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Mobile Header -->
    <header class="mobile-header"></header>

    <!-- Overlay for mobile menu -->
    <div class="overlay" onclick="toggleSidebar()"></div>

    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <div class="page-header">
                <h1 class="page-title" data-en="My Bookings" data-pt="As Minhas Reservas">My Bookings</h1>

            </div>

            <!-- Stats Summary -->
            <div class="stats-summary">
                <div class="stat-box">
                    <div class="stat-number">12</div>
                    <div class="stat-label-sm" data-en="Total Bookings" data-pt="Reservas Totais">Total Bookings</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number">2</div>
                    <div class="stat-label-sm" data-en="Upcoming" data-pt="Futuras">Upcoming</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number">9</div>
                    <div class="stat-label-sm" data-en="Completed" data-pt="Concluídas">Completed</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number">1</div>
                    <div class="stat-label-sm" data-en="Cancelled" data-pt="Canceladas">Cancelled</div>
                </div>
            </div>

            <!-- Filter Bar -->
            <div class="filter-bar">
                <div class="filter-group">
                    <label data-en="Status:" data-pt="Estado:">Status:</label>
                    <select id="filterStatus">
                        <option value="all" data-en="All Bookings" data-pt="Todas as Reservas">All Bookings</option>
                        <option value="confirmed" data-en="Confirmed" data-pt="Confirmadas">Confirmed</option>
                        <option value="pending" data-en="Pending" data-pt="Pendentes">Pending</option>
                        <option value="completed" data-en="Completed" data-pt="Concluídas">Completed</option>
                        <option value="cancelled" data-en="Cancelled" data-pt="Canceladas">Cancelled</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label data-en="From:" data-pt="De:">From:</label>
                    <input type="date" id="filterDateFrom">
                </div>
                <div class="filter-group">
                    <label data-en="To:" data-pt="Até:">To:</label>
                    <input type="date" id="filterDateTo">
                </div>
                <div class="filter-group" style="flex: 1;">
                    <input type="text" id="searchBookings" placeholder="Search by route or accommodation..." data-en-placeholder="Search by route or accommodation..." data-pt-placeholder="Pesquisar por rota ou alojamento..." style="width: 100%;">
                </div>
            </div>

            <!-- Bookings List -->
            <div class="bookings-grid" id="bookingsList">
                <!-- Bookings will be rendered here by JavaScript -->
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination">
                <button class="page-btn" disabled data-en="Previous" data-pt="Anterior">Previous</button>
                <button class="page-btn active">1</button>
                <button class="page-btn">2</button>
                <button class="page-btn">3</button>
                <button class="page-btn" data-en="Next" data-pt="Próximo">Next</button>
            </div>
        </main>
    </div>

    <script src="js/components.js"></script>
    <script>
        // Mock bookings data
        const mockBookings = [
            {
                id: 'BK-2025-001',
                route: { from: 'Vila Nova de Milfontes', to: 'Almograve' },
                date: '2025-03-15',
                bags: 2,
                status: 'confirmed',
                price: 35.00,
                accommodation: {
                    name: 'Hotel Milfontes',
                    address: 'Rua da Praia 25, Vila Nova de Milfontes',
                    phone: '+351 283 990 000'
                },
                createdAt: '2025-02-20T10:30:00'
            },
            {
                id: 'BK-2025-002',
                route: { from: 'Almograve', to: 'Zambujeira do Mar' },
                date: '2025-03-16',
                bags: 2,
                status: 'pending',
                price: 35.00,
                accommodation: {
                    name: 'Casa do Pescador',
                    address: 'Rua dos Pescadores 10, Almograve',
                    phone: '+351 283 995 000'
                },
                createdAt: '2025-02-20T10:35:00'
            },
            {
                id: 'BK-2025-003',
                route: { from: 'São Torpes', to: 'Vila Nova de Milfontes' },
                date: '2025-02-28',
                bags: 1,
                status: 'completed',
                price: 25.00,
                accommodation: {
                    name: 'Pousada de São Torpes',
                    address: 'Avenida da Praia, São Torpes',
                    phone: '+351 269 909 000'
                },
                createdAt: '2025-02-15T14:20:00'
            },
            {
                id: 'BK-2025-004',
                route: { from: 'Zambujeira do Mar', to: 'Odeceixe' },
                date: '2025-01-10',
                bags: 3,
                status: 'completed',
                price: 45.00,
                accommodation: {
                    name: 'Hotel Mar Azul',
                    address: 'Rua do Mar 50, Zambujeira do Mar',
                    phone: '+351 283 990 123'
                },
                createdAt: '2025-01-05T09:00:00'
            },
            {
                id: 'BK-2025-005',
                route: { from: 'Odeceixe', to: 'Aljezur' },
                date: '2024-12-20',
                bags: 2,
                status: 'cancelled',
                price: 40.00,
                accommodation: {
                    name: 'Casa da Duna',
                    address: 'Rua da Duna 15, Odeceixe',
                    phone: '+351 282 990 456'
                },
                createdAt: '2024-12-15T16:45:00'
            }
        ];

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', () => {
            initDashboard('bookings');
            renderBookings(mockBookings);
            setupFilters();
        });

        // Render bookings
        function renderBookings(bookings) {
            const container = document.getElementById('bookingsList');
            
            if (bookings.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M19 4H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V6a2 2 0 00-2-2z"></path>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                        </div>
                        <h3 class="empty-state-title" data-en="No Bookings Found" data-pt="Nenhuma Reserva Encontrada">No Bookings Found</h3>
                        <p class="empty-state-text" data-en="You haven't made any bookings yet. Start your journey along the Rota Vicentina!" data-pt="Ainda não fez nenhuma reserva. Comece a sua jornada pela Rota Vicentina!">You haven't made any bookings yet. Start your journey along the Rota Vicentina!</p>
                        <a href="index.html#book" class="btn btn-primary" data-en="Make Your First Booking" data-pt="Faça a Sua Primeira Reserva">Make Your First Booking</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = bookings.map(booking => `
                <div class="booking-card">
                    <div class="booking-header">
                        <div class="booking-route">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="3"></circle>
                                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"></path>
                            </svg>
                            ${booking.route.from} → ${booking.route.to}
                        </div>
                        <span class="status-badge ${booking.status}">${getStatusLabel(booking.status)}</span>
                    </div>
                    <div class="booking-body">
                        <div class="booking-details">
                            <div class="detail-group">
                                <span class="detail-label" data-en="Booking ID" data-pt="Nº Reserva">Booking ID</span>
                                <span class="detail-value">${booking.id}</span>
                            </div>
                            <div class="detail-group">
                                <span class="detail-label" data-en="Date" data-pt="Data">Date</span>
                                <span class="detail-value">${formatDate(booking.date)}</span>
                            </div>
                            <div class="detail-group">
                                <span class="detail-label" data-en="Bags" data-pt="Malas">Bags</span>
                                <span class="detail-value">${booking.bags} ${booking.bags === 1 ? (currentLang === 'pt' ? 'mala' : 'bag') : (currentLang === 'pt' ? 'malas' : 'bags')}</span>
                            </div>
                            <div class="detail-group">
                                <span class="detail-label" data-en="Accommodation" data-pt="Alojamento">Accommodation</span>
                                <span class="detail-value">${booking.accommodation.name}</span>
                            </div>
                        </div>
                        <div class="booking-footer">
                            <div class="booking-actions">
                                <button class="btn btn-secondary btn-sm" onclick="viewBookingDetails('${booking.id}')" data-en="View Details" data-pt="Ver Detalhes">View Details</button>
                                ${booking.status === 'confirmed' || booking.status === 'pending' ? `
                                    <button class="btn btn-secondary btn-sm" onclick="modifyBooking('${booking.id}')" data-en="Modify" data-pt="Modificar">Modify</button>
                                    <button class="btn btn-danger btn-sm" onclick="cancelBooking('${booking.id}')" data-en="Cancel" data-pt="Cancelar">Cancel</button>
                                ` : ''}
                                ${booking.status === 'completed' ? `
                                    <button class="btn btn-secondary btn-sm" onclick="rebookRoute('${booking.id}')" data-en="Rebook" data-pt="Reservar Novamente">Rebook</button>
                                ` : ''}
                            </div>
                            <div class="booking-price">€${booking.price.toFixed(2)}</div>
                        </div>
                    </div>
                </div>
            `).join('');

            // Re-apply language
            applyLanguage(currentLang);
        }

        // Get status label based on language
        function getStatusLabel(status) {
            const labels = {
                en: {
                    confirmed: 'Confirmed',
                    pending: 'Pending',
                    completed: 'Completed',
                    cancelled: 'Cancelled'
                },
                pt: {
                    confirmed: 'Confirmada',
                    pending: 'Pendente',
                    completed: 'Concluída',
                    cancelled: 'Cancelada'
                }
            };
            return labels[currentLang][status] || status;
        }

        // Setup filter event listeners
        function setupFilters() {
            const filterStatus = document.getElementById('filterStatus');
            const filterDateFrom = document.getElementById('filterDateFrom');
            const filterDateTo = document.getElementById('filterDateTo');
            const searchInput = document.getElementById('searchBookings');

            [filterStatus, filterDateFrom, filterDateTo, searchInput].forEach(el => {
                el.addEventListener('change', applyFilters);
                if (el.tagName === 'INPUT' && el.type === 'text') {
                    el.addEventListener('input', debounce(applyFilters, 300));
                }
            });
        }

        // Apply filters
        function applyFilters() {
            const status = document.getElementById('filterStatus').value;
            const dateFrom = document.getElementById('filterDateFrom').value;
            const dateTo = document.getElementById('filterDateTo').value;
            const search = document.getElementById('searchBookings').value.toLowerCase();

            let filtered = mockBookings;

            if (status !== 'all') {
                filtered = filtered.filter(b => b.status === status);
            }

            if (dateFrom) {
                filtered = filtered.filter(b => b.date >= dateFrom);
            }

            if (dateTo) {
                filtered = filtered.filter(b => b.date <= dateTo);
            }

            if (search) {
                filtered = filtered.filter(b => 
                    b.route.from.toLowerCase().includes(search) ||
                    b.route.to.toLowerCase().includes(search) ||
                    b.accommodation.name.toLowerCase().includes(search)
                );
            }

            renderBookings(filtered);
        }

        // Debounce helper
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Action handlers
        function viewBookingDetails(id) {
            showNotification(`Viewing details for booking ${id}`, 'success');
            console.log('View details:', id);
        }

        function modifyBooking(id) {
            showNotification(`Modifying booking ${id}`, 'warning');
            console.log('Modify booking:', id);
        }

        function cancelBooking(id) {
            if (confirm(currentLang === 'pt' ? 'Tem certeza que deseja cancelar esta reserva?' : 'Are you sure you want to cancel this booking?')) {
                showNotification(`Booking ${id} cancelled`, 'success');
                console.log('Cancel booking:', id);
            }
        }

        function rebookRoute(id) {
            showNotification(`Rebooking route from ${id}`, 'success');
            console.log('Rebook route:', id);
        }
    </script>
</body>
</html>
